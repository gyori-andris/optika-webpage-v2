name: Build and push container image

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Forgejo container registry
        uses: docker/login-action@v3
        with:
          registry: git.andris.boo
          username: ${{ gitea.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: git.andris.boo/gyori-andris/optika-webpage-v2:latest
          cache-from: type=registry,ref=git.andris.boo/gyori-andris/optika-webpage-v2:buildcache
          cache-to: type=registry,ref=git.andris.boo/gyori-andris/optika-webpage-v2:buildcache,mode=max

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST http://10.8.0.1:2586/homelab-alerts \
            -H "Title: CI Failed: optika-webpage-v2 Docker build" \
            -H "Priority: high" \
            -H "Tags: warning,ci" \
            -d "Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}"
